name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      VERCEL_ORG_ID: team_h9gQbgobxPAxpPXdlI6bwcSA
      VERCEL_PROJECT_ID: prj_07VAfsdQdqQtt1CkLAxULknMHEoW
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate required secret
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Missing required GitHub secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Pull Vercel project settings
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend artifact
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to production
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      RENDER_SERVICE_ID: srv-d6gqtmjh46gs73dpu680
    steps:
      - name: Validate required secret
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "Missing required GitHub secret: RENDER_API_KEY"
            exit 1
          fi

      - name: Trigger and monitor Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail

          deploy_json="$(curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')"

          deploy_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))' <<<"${deploy_json}")"
          if [ -z "${deploy_id}" ]; then
            echo "Failed to trigger Render deploy"
            echo "${deploy_json}"
            exit 1
          fi

          echo "Render deploy started: ${deploy_id}"

          for i in $(seq 1 90); do
            status_json="$(curl -fsS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")"
            status="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))' <<<"${status_json}")"
            echo "[${i}] status=${status}"

            case "${status}" in
              live)
                echo "Render deploy completed successfully."
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status=${status}"
                echo "${status_json}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out while waiting for Render deploy."
          exit 1
