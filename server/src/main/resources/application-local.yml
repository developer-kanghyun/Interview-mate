spring:
  datasource:
    url: jdbc:h2:mem:interviewmate;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: never

app:
  interview:
    seed-enabled: false
  rate-limit:
    enabled: false

openai:
  connect-timeout-ms: 500
  response-timeout-ms: 1000
